<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walkie Talkie - Comunicación Real</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .walkie-talkie {
            background: #2c3e50;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .connection-panel {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .peer-id-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .peer-id-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            background: white;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-success {
            background: #2ed573;
            color: white;
        }

        .btn-success:hover {
            background: #27ae60;
        }

        .btn-danger {
            background: #ff4757;
            color: white;
        }

        .btn-danger:hover {
            background: #e74c3c;
        }

        .my-id {
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            word-break: break-all;
        }

        .my-id span {
            font-weight: bold;
            color: #2c3e50;
        }

        .status-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .channel-display {
            font-size: 48px;
            font-weight: bold;
            color: #2c3e50;
            margin: 10px 0;
        }

        .connection-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #7f8c8d;
            animation: pulse 2s infinite;
        }

        .status-led.connected {
            background: #2ed573;
        }

        .status-led.transmitting {
            background: #ff4757;
        }

        .status-led.receiving {
            background: #ffa502;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .talk-btn {
            flex: 2;
            padding: 20px;
            font-size: 18px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 5px 0 #c0392b;
        }

        .talk-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #c0392b;
        }

        .talk-btn.active {
            background: #ff6b81;
        }

        .channel-btn {
            flex: 1;
            padding: 20px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .waveform {
            margin-top: 20px;
        }

        canvas {
            width: 100%;
            height: 60px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .battery-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            color: white;
        }

        .battery-bar {
            flex: 1;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
        }

        .battery-level {
            height: 100%;
            background: #2ed573;
            width: 100%;
            transition: width 1s ease;
        }

        h2, h3 {
            color: white;
            margin-bottom: 15px;
        }

        .instructions {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="walkie-talkie">
            <h2>🎙️ Walkie Talkie WebRTC</h2>
            
            <!-- Panel de conexión -->
            <div class="connection-panel">
                <div class="my-id">
                    <span>Tu ID:</span> <span id="myPeerId">Conectando...</span>
                </div>
                
                <div class="peer-id-section">
                    <input type="text" class="peer-id-input" id="peerIdInput" placeholder="ID del otro walkie-talkie">
                    <button class="btn btn-primary" id="connectBtn">Conectar</button>
                </div>
                
                <button class="btn btn-danger" id="disconnectBtn" style="width: 100%;">Desconectar</button>
            </div>
            
            <!-- Panel de estado -->
            <div class="status-panel">
                <div class="channel-display">
                    Canal <span id="channelNumber">7</span>
                </div>
                <div class="connection-status">
                    <div class="status-led" id="statusLed"></div>
                    <span id="connectionStatus">No conectado</span>
                </div>
                <div id="transmissionStatus" style="margin-top: 10px; color: #7f8c8d;">
                    Listo para conectar
                </div>
            </div>
            
            <!-- Visualizador de audio -->
            <div class="waveform">
                <canvas id="waveformCanvas" width="400" height="60"></canvas>
            </div>
            
            <!-- Indicador de batería -->
            <div class="battery-indicator">
                <span>🔋</span>
                <div class="battery-bar">
                    <div class="battery-level" id="batteryLevel"></div>
                </div>
                <span id="batteryText">100%</span>
            </div>
            
            <!-- Controles -->
            <div class="controls">
                <button class="talk-btn" id="talkBtn">
                    🎤 PRESIONA PARA HABLAR
                </button>
                <button class="channel-btn" id="channelBtn">
                    📻 Canal
                </button>
            </div>
            
            <div class="instructions">
                💡 Copia tu ID y compártelo. Pega el ID del otro dispositivo y haz clic en Conectar.
                <br>
                Mantén presionado el botón para hablar (como un walkie-talkie real)
            </div>
        </div>
    </div>

    <!-- Librerías -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <script>
        class RealWalkieTalkie {
            constructor() {
                this.peer = null;
                this.connection = null;
                this.localStream = null;
                this.remoteStream = null;
                this.isConnected = false;
                this.isTransmitting = false;
                this.channel = 7;
                this.battery = 100;
                
                // Elementos UI
                this.myPeerIdSpan = document.getElementById('myPeerId');
                this.peerIdInput = document.getElementById('peerIdInput');
                this.connectBtn = document.getElementById('connectBtn');
                this.disconnectBtn = document.getElementById('disconnectBtn');
                this.talkBtn = document.getElementById('talkBtn');
                this.channelBtn = document.getElementById('channelBtn');
                this.channelNumberSpan = document.getElementById('channelNumber');
                this.statusLed = document.getElementById('statusLed');
                this.connectionStatus = document.getElementById('connectionStatus');
                this.transmissionStatus = document.getElementById('transmissionStatus');
                this.batteryLevel = document.getElementById('batteryLevel');
                this.batteryText = document.getElementById('batteryText');
                
                // Canvas para waveform
                this.canvas = document.getElementById('waveformCanvas');
                this.canvasCtx = this.canvas.getContext('2d');
                this.audioContext = null;
                this.analyser = null;
                this.dataArray = null;
                
                this.init();
            }
            
            async init() {
                await this.initPeer();
                this.setupEventListeners();
                this.startBatteryDrain();
                this.startWaveformAnimation();
            }
            
            async initPeer() {
                // Generar ID único basado en timestamp
                const userId = 'walkie-' + Math.random().toString(36).substr(2, 9);
                
                this.peer = new Peer(userId);
                
                this.peer.on('open', (id) => {
                    this.myPeerIdSpan.textContent = id;
                    console.log('Peer conectado con ID:', id);
                });
                
                this.peer.on('call', async (call) => {
                    console.log('Recibiendo llamada...');
                    
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ 
                            audio: {
                                echoCancellation: true,
                                noiseSuppression: true,
                                autoGainControl: true
                            }, 
                            video: false 
                        });
                        
                        this.localStream = stream;
                        call.answer(stream);
                        
                        call.on('stream', (remoteStream) => {
                            console.log('Stream remoto recibido');
                            this.handleRemoteStream(remoteStream, call);
                        });
                        
                        this.connection = call;
                        this.updateConnectionStatus(true);
                        
                    } catch (error) {
                        console.error('Error respondiendo llamada:', error);
                        alert('Error accediendo al micrófono. Asegúrate de dar permisos.');
                    }
                });
                
                this.peer.on('error', (error) => {
                    console.error('Error en Peer:', error);
                    alert('Error de conexión: ' + error);
                });
            }
            
            async connectToPeer() {
                const peerId = this.peerIdInput.value.trim();
                
                if (!peerId) {
                    alert('Por favor ingresa un ID de conexión');
                    return;
                }
                
                if (peerId === this.peer.id) {
                    alert('No puedes conectarte a ti mismo. Usa otro dispositivo/navegador.');
                    return;
                }
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }, 
                        video: false 
                    });
                    
                    this.localStream = stream;
                    
                    const call = this.peer.call(peerId, stream);
                    
                    call.on('stream', (remoteStream) => {
                        console.log('Conectado al stream remoto');
                        this.handleRemoteStream(remoteStream, call);
                    });
                    
                    call.on('error', (error) => {
                        console.error('Error en la llamada:', error);
                        alert('Error al conectar: ' + error);
                    });
                    
                    this.connection = call;
                    this.updateConnectionStatus(true);
                    this.transmissionStatus.textContent = 'Conectando...';
                    
                } catch (error) {
                    console.error('Error iniciando llamada:', error);
                    alert('Error accediendo al micrófono. Asegúrate de dar permisos.');
                }
            }
            
            handleRemoteStream(remoteStream, connection) {
                this.remoteStream = remoteStream;
                this.connection = connection;
                this.isConnected = true;
                
                // Crear audio para reproducción remota
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play().catch(e => console.log('Autoplay bloqueado:', e));
                
                // Configurar analizador para el stream remoto
                this.setupAudioAnalyser(remoteStream);
                
                this.transmissionStatus.textContent = '✅ Conexión establecida';
                this.updateConnectionStatus(true);
                
                // Monitorear actividad de audio remoto
                this.monitorRemoteAudio(remoteStream);
            }
            
            setupAudioAnalyser(stream) {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.analyser = this.audioContext.createAnalyser();
                this.analyser.fftSize = 256;
                
                const source = this.audioContext.createMediaStreamSource(stream);
                source.connect(this.analyser);
                
                this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
            }
            
            monitorRemoteAudio(stream) {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                const checkAudio = () => {
                    analyser.getByteFrequencyData(dataArray);
                    const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
                    
                    if (average > 10) {
                        this.statusLed.className = 'status-led receiving';
                        this.transmissionStatus.textContent = '📨 Recibiendo transmisión';
                    } else if (!this.isTransmitting) {
                        this.statusLed.className = 'status-led connected';
                        this.transmissionStatus.textContent = '✅ Conectado - En espera';
                    }
                    
                    requestAnimationFrame(checkAudio);
                };
                
                checkAudio();
            }
            
            setupEventListeners() {
                this.connectBtn.addEventListener('click', () => {
                    this.connectToPeer();
                });
                
                this.disconnectBtn.addEventListener('click', () => {
                    this.disconnect();
                });
                
                // Botón de hablar (PTT - Push To Talk)
                this.talkBtn.addEventListener('mousedown', () => {
                    this.startTransmitting();
                });
                
                this.talkBtn.addEventListener('mouseup', () => {
                    this.stopTransmitting();
                });
                
                this.talkBtn.addEventListener('mouseleave', () => {
                    if (this.isTransmitting) {
                        this.stopTransmitting();
                    }
                });
                
                // Soporte táctil
                this.talkBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.startTransmitting();
                });
                
                this.talkBtn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.stopTransmitting();
                });
                
                // Cambiar canal
                this.channelBtn.addEventListener('click', () => {
                    this.changeChannel();
                });
            }
            
            startTransmitting() {
                if (!this.isConnected) {
                    alert('Conéctate a otro walkie-talkie primero');
                    return;
                }
                
                this.isTransmitting = true;
                this.talkBtn.classList.add('active');
                this.statusLed.className = 'status-led transmitting';
                this.transmissionStatus.textContent = '🎙️ TRANSMITIENDO...';
                
                // Efecto de sonido de "beep" inicial (simulado)
                this.playBeepSound();
            }
            
            stopTransmitting() {
                this.isTransmitting = false;
                this.talkBtn.classList.remove('active');
                
                if (this.isConnected) {
                    this.statusLed.className = 'status-led connected';
                    this.transmissionStatus.textContent = '✅ Conectado - En espera';
                }
                
                // Efecto de sonido de "beep" final (simulado)
                this.playBeepSound(true);
            }
            
            playBeepSound(isEnd = false) {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.frequency.value = isEnd ? 800 : 1000;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.1);
                
                oscillator.start();
                oscillator.stop(this.audioContext.currentTime + 0.1);
            }
            
            disconnect() {
                if (this.connection) {
                    this.connection.close();
                }
                
                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => track.stop());
                }
                
                this.isConnected = false;
                this.connection = null;
                this.localStream = null;
                this.remoteStream = null;
                
                this.updateConnectionStatus(false);
                this.transmissionStatus.textContent = 'Desconectado';
                this.statusLed.className = 'status-led';
            }
            
            changeChannel() {
                this.channel = this.channel >= 20 ? 1 : this.channel + 1;
                this.channelNumberSpan.textContent = this.channel;
                
                // Efecto visual de cambio de canal
                this.channelNumberSpan.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    this.channelNumberSpan.style.transform = 'scale(1)';
                }, 100);
            }
            
            updateConnectionStatus(connected) {
                this.isConnected = connected;
                this.connectionStatus.textContent = connected ? 'Conectado' : 'No conectado';
                this.statusLed.className = connected ? 'status-led connected' : 'status-led';
                
                if (!connected) {
                    this.transmissionStatus.textContent = 'Listo para conectar';
                }
            }
            
            startBatteryDrain() {
                setInterval(() => {
                    if (this.isTransmitting) {
                        this.battery = Math.max(0, this.battery - 1);
                    } else if (this.isConnected) {
                        this.battery = Math.max(0, this.battery - 0.3);
                    } else {
                        this.battery = Math.max(0, this.battery - 0.1);
                    }
                    
                    this.batteryLevel.style.width = this.battery + '%';
                    this.batteryText.textContent = Math.floor(this.battery) + '%';
                    
                    // Cambiar color según nivel
                    if (this.battery < 20) {
                        this.batteryLevel.style.background = '#ff4757';
                    } else if (this.battery < 50) {
                        this.batteryLevel.style.background = '#ffa502';
                    } else {
                        this.batteryLevel.style.background = '#2ed573';
                    }
                    
                    // Desconectar si se acaba la batería
                    if (this.battery === 0 && this.isConnected) {
                        alert('¡Batería agotada! Desconectando...');
                        this.disconnect();
                    }
                }, 1000);
            }
            
            startWaveformAnimation() {
                const draw = () => {
                    if (!this.canvasCtx) return;
                    
                    const ctx = this.canvasCtx;
                    const w = this.canvas.width;
                    const h = this.canvas.height;
                    
                    ctx.clearRect(0, 0, w, h);
                    
                    if (this.analyser && this.dataArray) {
                        this.analyser.getByteTimeDomainData(this.dataArray);
                        
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = this.isTransmitting ? '#ff4757' : '#2ed573';
                        ctx.beginPath();
                        
                        const sliceWidth = w / this.dataArray.length;
                        let x = 0;
                        
                        for (let i = 0; i < this.dataArray.length; i++) {
                            const v = this.dataArray[i] / 128.0;
                            const y = v * h / 2;
                            
                            if (i === 0) {
                                ctx.moveTo(x, y);
                            } else {
                                ctx.lineTo(x, y);
                            }
                            
                            x += sliceWidth;
                        }
                        
                        ctx.lineTo(w, h / 2);
                        ctx.stroke();
                        
                        // Relleno con gradiente
                        const gradient = ctx.createLinearGradient(0, 0, 0, h);
                        gradient.addColorStop(0, this.isTransmitting ? 'rgba(255, 71, 87, 0.3)' : 'rgba(46, 213, 115, 0.3)');
                        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                        
                        ctx.fillStyle = gradient;
                        ctx.fill();
                    } else {
                        // Sin conexión - mostrar línea plana
                        ctx.strokeStyle = '#7f8c8d';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(0, h/2);
                        ctx.lineTo(w, h/2);
                        ctx.stroke();
                        
                        ctx.fillStyle = 'rgba(127, 140, 141, 0.1)';
                        ctx.fillRect(0, h/2 - 10, w, 20);
                    }
                    
                    requestAnimationFrame(draw);
                };
                
                draw();
            }
        }
        
        // Inicializar cuando la página cargue
        window.addEventListener('load', () => {
            new RealWalkieTalkie();
        });
    </script>
</body>
</html>
