<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESEFIP - Diagnóstico</title>
<script src="js/supabase.js"></script>
<style>
    body { font-family: monospace; background: #0a1628; color: #f1f5f9; padding: 16px; font-size: 13px; }
    h2 { color: #D4A017; margin-bottom: 16px; }
    .test { background: #0d1e35; border-radius: 10px; padding: 14px; margin-bottom: 12px; border-left: 4px solid #333; }
    .test.ok   { border-color: #10b981; }
    .test.fail { border-color: #ef4444; }
    .test.wait { border-color: #f59e0b; }
    .label { font-weight: bold; margin-bottom: 6px; color: #94a3b8; font-size: 12px; text-transform: uppercase; }
    .result { word-break: break-all; color: #f1f5f9; }
    .ok   .result { color: #34d399; }
    .fail .result { color: #f87171; }
    button { background: #D4A017; color: #0a1628; border: none; padding: 12px 24px; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; width: 100%; margin-bottom: 10px; }
</style>
</head>
<body>
<h2>🔧 Diagnóstico ESEFIP</h2>

<div class="test wait" id="t-telegram">
    <div class="label">📨 Telegram Bot</div>
    <div class="result" id="r-telegram">Esperando...</div>
</div>

<div class="test wait" id="t-token">
    <div class="label">🔑 Token</div>
    <div class="result" id="r-token">—</div>
</div>

<div class="test wait" id="t-chat">
    <div class="label">💬 Chat ID</div>
    <div class="result" id="r-chat">—</div>
</div>

<div class="test wait" id="t-supabase">
    <div class="label">🗄️ Supabase — Pagos</div>
    <div class="result" id="r-supabase">Esperando...</div>
</div>

<div class="test wait" id="t-pagos">
    <div class="label">💰 sp_listar_pagos_admin</div>
    <div class="result" id="r-pagos">Esperando...</div>
</div>

<div class="test wait" id="t-desc">
    <div class="label">📉 resumenDescuentos (query directa)</div>
    <div class="result" id="r-desc">Esperando...</div>
</div>

<button onclick="runAll()">▶ Ejecutar Diagnóstico</button>
<button onclick="sendTelegramManual()" style="background:#3b82f6">📤 Enviar Mensaje de Prueba a Telegram</button>

<script>
function setResult(id, ok, text) {
    const el = document.getElementById('t-' + id);
    el.className = 'test ' + (ok ? 'ok' : 'fail');
    document.getElementById('r-' + id).textContent = text;
}

async function runAll() {
    // Token info
    setResult('token', true, TELEGRAM_BOT.slice(0,15) + '...' + TELEGRAM_BOT.slice(-10));
    setResult('chat', true, 'Chat ID: ' + TELEGRAM_CHAT);

    // Test Telegram
    setResult('telegram', null, '⏳ Probando...');
    document.getElementById('t-telegram').className = 'test wait';
    try {
        const r = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT}/getMe`);
        const d = await r.json();
        if (d.ok) {
            setResult('telegram', true, '✅ Bot OK: @' + d.result.username + ' (' + d.result.first_name + ')');
        } else {
            setResult('telegram', false, '❌ ' + d.error_code + ': ' + d.description);
        }
    } catch(e) {
        setResult('telegram', false, '❌ CORS/Network: ' + e.message);
    }

    // Test Supabase — pagos directos
    document.getElementById('t-supabase').className = 'test wait';
    document.getElementById('r-supabase').textContent = '⏳ Consultando...';
    try {
        const now = new Date();
        const data = await rpc('sp_listar_pagos_admin', { p_mes: now.getMonth()+1, p_anio: now.getFullYear() });
        setResult('supabase', true, '✅ ' + (data ? data.length : 0) + ' pagos encontrados este mes');
        setResult('pagos', true, JSON.stringify(data?.[0] || 'Sin datos').slice(0, 200));
    } catch(e) {
        setResult('supabase', false, '❌ ' + e.message);
        setResult('pagos', false, e.message);
    }

    // Test descuentos query directa
    document.getElementById('t-desc').className = 'test wait';
    document.getElementById('r-desc').textContent = '⏳ Consultando...';
    try {
        const now = new Date();
        const mes = now.getMonth()+1;
        const anio = now.getFullYear();
        const mesStr = String(mes).padStart(2,'0');
        const data = await query('descuentos_diarios',
            `usuario_id=neq.0&fecha=gte.${anio}-${mesStr}-01&fecha=lte.${anio}-${mesStr}-31&select=usuario_id,tipo,monto&limit=5`
        );
        setResult('desc', true, '✅ ' + (data ? data.length : 0) + ' registros. Muestra: ' + JSON.stringify(data?.[0] || 'vacío'));
    } catch(e) {
        setResult('desc', false, '❌ ' + e.message);
    }
}

async function sendTelegramManual() {
    const btn = document.querySelector('button:nth-of-type(2)');
    btn.textContent = '⏳ Enviando...';
    btn.disabled = true;
    try {
        const r = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT,
                text: '🧪 <b>Test ESEFIP</b>\nDiagnóstico desde GitHub Pages\n⏰ ' + new Date().toLocaleString('es-ES'),
                parse_mode: 'HTML'
            })
        });
        const d = await r.json();
        if (d.ok) {
            btn.textContent = '✅ ¡Enviado! Revisa Telegram';
            btn.style.background = '#10b981';
        } else {
            btn.textContent = '❌ Error ' + d.error_code + ': ' + d.description;
            btn.style.background = '#ef4444';
            btn.style.color = 'white';
        }
    } catch(e) {
        btn.textContent = '❌ ' + e.message;
        btn.style.background = '#ef4444';
        btn.style.color = 'white';
    }
    btn.disabled = false;
}

// Auto-ejecutar al cargar
window.onload = runAll;
</script>
</body>
</html>
